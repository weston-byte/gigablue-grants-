<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#020810">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Grant Intel">
<title>Gigablue · Grant Intelligence System</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#020810;--bg1:#040d1a;--bg2:#060f20;--bg3:#0a1828;
  --border:#0d2a45;--borderB:#1e5a8a;
  --cyan:#4fc3f7;--cyanD:#1a6a9a;
  --orange:#f97316;--purple:#a78bfa;--amber:#fbbf24;--red:#f87171;
  --mutedT:#5a9fc0;--text:#d0eeff;--textD:#6a9ab8;--textF:#2a5070;
}
html,body{background:var(--bg0);font-family:'Courier New',monospace;height:100%;overflow:hidden}
.wrap{background:var(--bg0);color:var(--text);font-family:'Courier New',monospace;border-radius:0;overflow:hidden;display:flex;flex-direction:column;min-height:100dvh;border:none}

/* ── Header ── */
.hdr{background:var(--bg1);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:stretch;justify-content:space-between;flex-shrink:0;min-height:48px}
.hdr-l{display:flex;align-items:center;gap:10px;padding:8px 0}
.hdr-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--cyan)}
.hdr-sub{font-size:9px;color:var(--cyanD);letter-spacing:1px}
.hdr-r{display:flex;align-items:center;gap:0}
.hdr-stat-block{display:flex;align-items:center;gap:8px;padding:0 14px;border-left:1px solid var(--border)}
.hdr-stat{font-size:9px;color:var(--cyanD);letter-spacing:1px;white-space:nowrap}
.hdr-stat b{color:var(--cyan);font-weight:700}
.hdr-owners{display:flex;align-items:center;gap:6px;padding:0 14px;border-left:1px solid var(--border);min-width:0}
.hdr-owners-label{font-size:9px;color:var(--textF);letter-spacing:1px;white-space:nowrap;margin-right:2px}
.owner-chip{display:flex;align-items:center;gap:5px;padding:3px 8px 3px 4px;background:rgba(79,195,247,0.08);border:1px solid rgba(79,195,247,0.2);border-radius:12px;white-space:nowrap}
.owner-avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#020810;flex-shrink:0}
.owner-chip-name{font-size:9px;color:var(--cyan);letter-spacing:0.5px}
.no-owners{font-size:9px;color:var(--textF);letter-spacing:0.5px;font-style:italic}

/* ── Body: resizable split ── */
.body{display:flex;flex:1;min-height:0;position:relative}

/* Divider */
#divider{width:5px;background:var(--border);cursor:col-resize;flex-shrink:0;position:relative;z-index:20;transition:background 0.2s}
#divider:hover,#divider.dragging{background:var(--cyan)}
#divider::after{content:'';position:absolute;left:-4px;right:-4px;top:0;bottom:0}

/* Left: globe panel */
.left{position:relative;display:flex;flex-direction:column;flex-shrink:0;min-width:240px;overflow:hidden}
.scanline{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,20,40,0.05) 3px,rgba(0,20,40,0.05) 4px);pointer-events:none;z-index:2}
.corner{position:absolute;width:14px;height:14px;z-index:3;pointer-events:none}
.c-tl{top:6px;left:6px;border-top:1px solid var(--borderB);border-left:1px solid var(--borderB)}
.c-tr{top:6px;right:6px;border-top:1px solid var(--borderB);border-right:1px solid var(--borderB)}
#globe-mount{flex:1;position:relative;cursor:crosshair;overflow:hidden;min-height:200px}
#globe-mount canvas{display:block;width:100%!important;height:100%!important}
.hint{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--textF);letter-spacing:1px;pointer-events:none;z-index:3;white-space:nowrap}

/* Legend + upload sit below the globe, no overlap */
.left-foot{flex-shrink:0;display:flex;flex-direction:column;background:var(--bg1);border-top:1px solid var(--border)}
.legend{display:flex}
.leg-item{flex:1;padding:5px 5px;display:flex;align-items:center;gap:4px;border-right:1px solid var(--bg0)}
.leg-item:last-child{border-right:none}
.leg-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.leg-lbl{font-size:8px;color:var(--textF);letter-spacing:0.3px}
.upload-zone{margin:6px 8px 8px;border:1px dashed var(--border);border-radius:6px;padding:7px 8px;text-align:center;cursor:pointer;transition:all 0.2s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--cyan);background:rgba(79,195,247,0.04)}
.upload-plus{font-size:16px;color:var(--cyanD);line-height:1}
.upload-t{font-size:9px;color:var(--textF);letter-spacing:1px;margin-top:2px}
.upload-s{font-size:8px;color:#1e4060;margin-top:1px}

/* Right: info panel */
.right{flex:1;display:flex;flex-direction:column;overflow:hidden;border-left:1px solid var(--border);min-width:180px}
.panel-hdr{background:var(--bg1);border-bottom:1px solid var(--border);padding:10px 16px 0;flex-shrink:0}
.panel-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.panel-geo{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.geo-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.panel-title{font-size:18px;font-weight:700;color:#e8f8ff;margin:0 0 6px;letter-spacing:0.3px;line-height:1.2}
.panel-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.status-badge{font-size:9px;font-weight:700;letter-spacing:1.5px;padding:3px 10px;border-radius:3px;text-transform:uppercase}
.fund-val{font-size:11px;color:var(--orange);font-family:'Courier New',monospace}
.node-picker{display:flex;flex-wrap:wrap;gap:3px;justify-content:flex-end;max-width:120px;align-self:flex-start;padding-top:2px}
.node-pip{width:9px;height:9px;border-radius:50%;cursor:pointer;transition:all 0.15s;flex-shrink:0}
.tabs{display:flex;gap:3px;padding-bottom:0}
.tab-btn{padding:7px 14px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:'Courier New',monospace;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-bottom:none;border-radius:5px 5px 0 0;color:var(--textD);transition:all 0.2s;white-space:nowrap}
.tab-btn:hover{background:rgba(255,255,255,0.07);color:var(--text);border-color:var(--borderB)}
.tab-btn.active{background:var(--bg2);border-color:var(--borderB);color:#fff;position:relative;top:1px}

.content{flex:1;overflow-y:auto;padding:14px 16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;background:var(--bg2)}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:var(--border)}
.sec-label{font-size:9px;letter-spacing:2px;color:var(--cyanD);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sec-line{flex:1;height:1px;background:var(--border)}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px;margin-bottom:14px}
.metric{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bg3)}
.m-k{font-size:10px;color:var(--mutedT);letter-spacing:0.5px}
.m-v{font-size:11px;font-weight:700;color:var(--cyan);font-family:'Courier New',monospace}
.bar-wrap{margin-bottom:9px}
.bar-lbl{display:flex;justify-content:space-between;font-size:9px;color:var(--textF);margin-bottom:3px}
.bar-track{height:4px;background:var(--bg3);border-radius:2px}
.bar-fill{height:4px;border-radius:2px;transition:width 0.6s ease}
.body-text{font-size:12px;color:var(--mutedT);line-height:1.8;margin:0}
.action-row{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--bg3)}
.action-num{font-size:9px;font-weight:700;min-width:20px;padding-top:2px;flex-shrink:0}
.action-text{font-size:12px;line-height:1.6;margin:0}
.urgent-tag{font-size:8px;letter-spacing:1px;color:var(--orange);margin-top:2px;text-transform:uppercase}
.owner-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);border-radius:6px;border:1px solid var(--border);margin-bottom:6px}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#020810;flex-shrink:0}
.owner-name{font-size:13px;color:var(--text);font-weight:500}
.owner-date{font-size:9px;color:var(--textF)}
.rm-btn{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.22);color:var(--red);cursor:pointer;font-size:10px;padding:3px 9px;border-radius:4px;font-family:inherit;transition:all 0.2s;white-space:nowrap}
.rm-btn:hover{background:rgba(248,113,113,0.2);border-color:var(--red)}
.input-row{display:flex;gap:8px;margin-top:8px}
.inp{flex:1;background:var(--bg0);border:1px solid var(--borderB);border-radius:6px;padding:7px 10px;font-size:12px;color:var(--text);font-family:'Courier New',monospace;outline:none;transition:border-color 0.2s}
.inp:focus{border-color:var(--cyan)}
.btn-assign{background:rgba(79,195,247,0.15);border:1px solid var(--cyan);border-radius:6px;padding:7px 14px;font-size:10px;color:var(--cyan);cursor:pointer;font-weight:700;letter-spacing:1.5px;font-family:'Courier New',monospace;white-space:nowrap;transition:all 0.2s}
.btn-assign:hover{background:rgba(79,195,247,0.28);color:#fff}
.btn-commit{width:100%;padding:8px;font-size:10px;letter-spacing:2px;margin-top:8px;background:rgba(79,195,247,0.12);border:1px solid var(--borderB);border-radius:6px;color:var(--cyan);cursor:pointer;font-weight:700;font-family:'Courier New',monospace;transition:all 0.2s}
.btn-commit:hover{background:rgba(79,195,247,0.24);border-color:var(--cyan);color:#fff}
.empty-state{padding:20px 0;text-align:center;color:var(--textF);font-size:11px;letter-spacing:0.5px}
.log-entry{padding:9px 11px;border-left:2px solid var(--border);margin-bottom:3px}
.log-entry.latest{background:rgba(79,195,247,0.04);border-radius:0 4px 4px 0}
.log-ts{font-size:9px;letter-spacing:1px;margin-bottom:3px}
.log-text{font-size:12px;line-height:1.65;margin:0;color:var(--mutedT)}
.log-text.latest{color:var(--text)}
.log-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.ta{width:100%;background:var(--bg0);border:1px solid var(--borderB);border-radius:6px;padding:8px 10px;font-size:12px;color:var(--text);font-family:'Courier New',monospace;outline:none;resize:none;line-height:1.65;transition:border-color 0.2s}
.ta:focus{border-color:var(--cyan)}
.gmail-note{margin-top:18px;padding:11px 13px;background:var(--bg3);border-radius:6px;border:1px solid var(--border)}
.gmail-note-t{font-size:9px;color:var(--textF);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.gmail-note-b{font-size:11px;color:var(--textF);line-height:1.65;margin:0}
.analytics-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.analytic-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
.analytic-lbl{font-size:8px;letter-spacing:1.5px;color:var(--textF);text-transform:uppercase;margin-bottom:4px}
.analytic-val{font-size:15px;font-weight:700;font-family:'Courier New',monospace}
.analytic-sub{font-size:9px;color:var(--textF);margin-top:2px}
.risk-tag{display:inline-block;font-size:8px;letter-spacing:1px;padding:2px 7px;border-radius:3px;margin:2px 3px 2px 0;text-transform:uppercase}
.dep-item{font-size:11px;color:var(--mutedT);padding:4px 0;border-bottom:1px solid var(--bg3);display:flex;align-items:center;gap:7px}
.dep-item:last-child{border-bottom:none}
.dep-dot{width:5px;height:5px;border-radius:50%;background:var(--borderB);flex-shrink:0}
/* ── Team hierarchy diagram ── */
.hierarchy-wrap{margin-bottom:16px;overflow-x:auto}
.hierarchy-svg{display:block;margin:0 auto}
.role-section{margin-bottom:12px}
.role-section-hdr{font-size:9px;letter-spacing:2px;color:var(--cyanD);text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:8px;padding-top:6px;border-top:1px solid var(--border)}
.role-badge{font-size:8px;letter-spacing:1px;padding:2px 8px;border-radius:3px;margin-left:auto;white-space:nowrap}
.role-select{background:var(--bg0);border:1px solid var(--borderB);border-radius:5px;padding:5px 8px;font-size:11px;color:var(--text);font-family:'Courier New',monospace;outline:none;flex:0 0 auto;min-width:130px}
.role-select:focus{border-color:var(--cyan)}


/* ── Mobile layout ── */
@media(max-width:700px){
  html,body{overflow:auto;height:auto}
  .wrap{min-height:100dvh;border-radius:0;border:none}
  .hdr{flex-wrap:wrap;min-height:auto;padding:8px 12px;gap:6px}
  .hdr-l{gap:7px}
  .hdr-title{font-size:9px;letter-spacing:1.5px}
  .hdr-sub{display:none}
  .hdr-r{flex-wrap:wrap;gap:4px;width:100%}
  .hdr-stat-block{padding:0 8px;gap:6px;border-left:none;border-top:1px solid var(--border);width:100%;justify-content:space-around}
  .hdr-owners{display:none}
  .body{flex-direction:column;overflow:visible;min-height:0}
  #divider{display:none}
  .left{width:100%!important;flex-shrink:0;min-width:0;border-bottom:1px solid var(--border)}
  #globe-mount{min-height:260px;max-height:300px}
  .left-foot{}
  .legend{flex-wrap:wrap}
  .leg-item{min-width:45%}
  .right{width:100%!important;min-width:0;border-left:none;border-top:1px solid var(--border)}
  .panel-hdr{padding:8px 12px 0}
  .panel-title{font-size:14px}
  .tabs{overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;gap:2px;padding-bottom:0}
  .tabs::-webkit-scrollbar{display:none}
  .tab-btn{padding:6px 10px;font-size:9px;white-space:nowrap;flex-shrink:0}
  .content{padding:10px 12px;overflow-y:auto;max-height:60dvh}
  .analytics-grid{grid-template-columns:1fr 1fr}
  .metric-grid{grid-template-columns:1fr 1fr}
  .node-picker{max-width:80px}
  .node-pip{width:7px;height:7px}
  .input-row{flex-wrap:wrap;gap:6px}
  .inp{min-width:0;flex:1 1 120px}
  .role-select{min-width:100px;flex:1 1 100px}
  .btn-assign{flex:0 0 auto}
  .upload-zone{margin:4px 6px 6px}
  .owner-row{gap:7px;padding:6px 9px}
}
@media(max-width:400px){
  .hdr-title{font-size:8px}
  .panel-title{font-size:12px}
  .analytics-grid{grid-template-columns:1fr}
  .tab-btn{padding:5px 8px;font-size:8px}
}

.sync-dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:4px;vertical-align:middle}
.email-badge{display:inline-flex;align-items:center;gap:4px;font-size:8px;letter-spacing:1px;padding:2px 7px;border-radius:3px;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);color:#34d399;text-transform:uppercase;margin-left:8px}
.sync-banner{position:fixed;bottom:12px;right:12px;background:var(--bg1);border:1px solid var(--borderB);border-radius:6px;padding:8px 14px;font-size:10px;color:var(--cyan);letter-spacing:1px;z-index:999;transition:opacity 0.4s}
.sync-banner.hide{opacity:0;pointer-events:none}

/* ── Auth gate ── */
#auth-gate{position:fixed;inset:0;background:#020810;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
#auth-gate.hidden{display:none}
.auth-box{background:#040d1a;border:1px solid #1e5a8a;border-radius:10px;padding:32px 36px;display:flex;flex-direction:column;gap:16px;min-width:300px}
.auth-title{font-size:11px;font-weight:700;letter-spacing:3px;color:#4fc3f7;text-transform:uppercase;text-align:center}
.auth-sub{font-size:9px;letter-spacing:1.5px;color:#2a5070;text-align:center;margin-top:-8px}
.auth-inp{background:#020810;border:1px solid #1e5a8a;border-radius:5px;padding:10px 14px;font-size:13px;color:#d0eeff;font-family:'Courier New',monospace;outline:none;width:100%;letter-spacing:2px}
.auth-inp:focus{border-color:#4fc3f7}
.auth-btn{background:#1e5a8a;border:none;border-radius:5px;padding:10px;font-size:10px;letter-spacing:2px;color:#4fc3f7;font-family:'Courier New',monospace;cursor:pointer;text-transform:uppercase;font-weight:700}
.auth-btn:hover{background:#2a6a9a}
.auth-err{font-size:9px;color:#f87171;letter-spacing:1px;text-align:center;min-height:14px}

/* ── Auth gate ── */
#auth-gate{position:fixed;inset:0;background:#020810;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
#auth-gate.hidden{display:none}
.auth-box{background:#040d1a;border:1px solid #1e5a8a;border-radius:10px;padding:32px 36px;display:flex;flex-direction:column;gap:16px;min-width:300px}
.auth-title{font-size:11px;font-weight:700;letter-spacing:3px;color:#4fc3f7;text-transform:uppercase;text-align:center}
.auth-sub{font-size:9px;letter-spacing:1.5px;color:#2a5070;text-align:center;margin-top:-8px}
.auth-inp{background:#020810;border:1px solid #1e5a8a;border-radius:5px;padding:10px 14px;font-size:13px;color:#d0eeff;font-family:'Courier New',monospace;outline:none;width:100%;letter-spacing:2px}
.auth-inp:focus{border-color:#4fc3f7}
.auth-btn{background:#1e5a8a;border:none;border-radius:5px;padding:10px;font-size:10px;letter-spacing:2px;color:#4fc3f7;font-family:'Courier New',monospace;cursor:pointer;text-transform:uppercase;font-weight:700}
.auth-btn:hover{background:#2a6a9a}
.auth-err{font-size:9px;color:#f87171;letter-spacing:1px;text-align:center;min-height:14px}
</style>

<div id="auth-gate">
  <div class="auth-box">
    <div class="auth-title">Gigablue</div>
    <div class="auth-sub">// Grant Intelligence System</div>
    <input id="auth-inp" class="auth-inp" type="password" placeholder="Access code..." onkeydown="if(event.key==='Enter')checkAuth()">
    <button class="auth-btn" onclick="checkAuth()">Authenticate</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>
<div class="wrap" style="display:none" id="main-wrap">
  <!-- Header with owner chips -->
  <div class="hdr">
    <div class="hdr-l">
      <div style="width:8px;height:8px;border-radius:50%;background:#f97316"></div>
      <div style="width:8px;height:8px;border-radius:50%;background:#4fc3f7;margin-left:-4px"></div>
      <span class="hdr-title">GIGABLUE · GRANT INTELLIGENCE SYSTEM</span>
      <span class="hdr-sub">// v6.0</span>
      <span class="hdr-sub" id="sync-status" style="color:var(--textF);margin-left:6px"></span>
    </div>
    <div class="hdr-r">
      <div class="hdr-stat-block">
        <span class="hdr-stat">vectors: <b id="stat-total">12</b></span>
        <span class="hdr-stat">active: <b id="stat-active">3</b></span>
        <span class="hdr-stat">updates: <b id="stat-updates">0</b></span>
      </div>
      <div class="hdr-owners" id="hdr-owners">
        <span class="hdr-owners-label">OWNERS //</span>
        <span class="no-owners" id="hdr-owners-inner">none assigned</span>
      </div>
    </div>
  </div>

  <div class="body" id="body-el">
    <!-- Left panel: globe + legend + upload -->
    <div class="left" id="left-panel">
      <div class="scanline"></div>
      <div class="corner c-tl"></div>
      <div class="corner c-tr"></div>
      <div id="globe-mount">
        <div class="hint">DRAG · SCROLL · CLICK NODES</div>
      </div>
      <div class="left-foot">
        <div class="legend">
          <div class="leg-item"><div class="leg-dot" style="background:#f97316"></div><div class="leg-lbl">Pursue now</div></div>
          <div class="leg-item"><div class="leg-dot" style="background:#4fc3f7"></div><div class="leg-lbl">High potential</div></div>
          <div class="leg-item"><div class="leg-dot" style="background:#a78bfa"></div><div class="leg-lbl">Watch / develop</div></div>
          <div class="leg-item"><div class="leg-dot" style="background:#374151"></div><div class="leg-lbl">Future 2027+</div></div>
        </div>
        <div class="upload-zone" id="upload-zone">
          <input type="file" id="file-inp" accept=".pdf,.txt,.md,.png,.jpg,.jpeg" style="display:none">
          <div id="upload-inner">
            <div class="upload-plus">+</div>
            <div class="upload-t">DROP GRANT DOCUMENT · ADD VECTOR</div>
            <div class="upload-s">PDF · TXT · MD · PNG — parsed by AI</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Divider -->
    <div id="divider"></div>

function loadStorage(){

function setSyncStatus(state,msg){
  const el=document.getElementById('sync-status');if(!el)return;
  const colors={syncing:'#4fc3f7',ok:'#34d399',err:'#f87171',idle:'#2a5070'};
  el.innerHTML=`<span class="sync-dot" style="background:${colors[state]||colors.idle}"></span>${msg}`;
}

function showBanner(msg,ms=3000){
  let b=document.getElementById('sync-banner');
  if(!b){b=document.createElement('div');b.id='sync-banner';b.className='sync-banner';document.body.appendChild(b);}
  b.className='sync-banner';b.textContent=msg;
  setTimeout(()=>b.classList.add('hide'),ms);
}

async function syncFromGmail(){
  if(!APPS_SCRIPT_URL||APPS_SCRIPT_URL==='YOUR_APPS_SCRIPT_WEB_APP_URL_HERE'){
    setSyncStatus('idle','gmail: not connected');return;
  }
  setSyncStatus('syncing','// syncing...');
  try{
    const resp=await fetch(APPS_SCRIPT_URL);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const data=await resp.json();

    let newCount=0,updateCount=0;

    // Merge new grants from email discoveries
    if(data.grants&&data.grants.length){
      data.grants.forEach(g=>{
        if(!g||!g.id)return;
        // Don't overwrite SEED grants
        if(SEED.find(s=>s.id===g.id))return;
        const existing=grants.find(e=>e.id===g.id);
        if(!existing){
          // Brand new — add to globe
          grants.push(g);
          newCount++;
        } else {
          // Update standing/desc if newer
          existing.standing=g.standing||existing.standing;
          existing.desc=g.desc||existing.desc;
          updateCount++;
        }
      });
      if(newCount>0){saveGrants();rebuildGlobe();}
    }

    // Merge auto-logged email comments
    if(data.comments){
      Object.entries(data.comments).forEach(([grantId,emailComments])=>{
        if(!comments[grantId])comments[grantId]=[];
        emailComments.forEach(ec=>{
          if(!comments[grantId].find(c=>c.id===ec.id)){
            comments[grantId].push(ec);
            updateCount++;
          }
        });
      });
      if(updateCount>0)saveComments();
    }

    updateStats();renderNodePicker();renderContent();
    localStorage.setItem('gb5_lastSync',new Date().toISOString());

    const lastSync=data.lastSync?new Date(data.lastSync).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'—';
    setSyncStatus('ok',`// synced ${lastSync}`);

    if(newCount>0)showBanner(`// ${newCount} new grant vector${newCount>1?'s':''} discovered from Gmail`);
    else if(updateCount>0)showBanner(`// ${updateCount} update${updateCount>1?'s':''} pulled from Gmail`);

  }catch(err){
    setSyncStatus('err','// sync failed');
    console.warn('Gmail sync failed:',err);
  }
}

}

async function handleFile(file){
  document.getElementById('upload-inner').innerHTML='<div style="font-size:10px;color:#4fc3f7;letter-spacing:1px">// PARSING WITH AI...</div>';
  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=()=>rej(new Error('read fail'));r.readAsDataURL(file);});
    const isPDF=/\.pdf$/i.test(file.name),isImg=/\.(png|jpg|jpeg|webp)$/i.test(file.name);
    const mt=isPDF?'application/pdf':isImg?'image/png':'text/plain';
    const content=[];
    if(isPDF||isImg)content.push({type:isPDF?'document':'image',source:{type:'base64',media_type:mt,data:b64}});
    else content.push({type:'text',text:'Document content: '+atob(b64).slice(0,8000)});
    content.push({type:'text',text:'Extract grant/funding information. Return ONLY valid JSON (no markdown):\n{"label":"short name","geo":"country/region","status":"pursue|highpot|watch|future","fundSize":"fund size","timeline":"key timeline","readiness":0-100,"urgency":0-100,"desc":"2-3 sentence description","standing":"current engagement status","actions":[{"t":"action item","u":true/false}],"metrics":[{"k":"label","v":"value"}]}'});
    const resp=await fetch('https://gigablue-grants-api.YOUR-SUBDOMAIN.workers.dev',{method:'POST',headers:{'Content-Type':'application/json','X-App-Token':'56e60ceb1a69aa313f394801ee33d9bdef985d3817d4a508'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content}]})});
    const data=await resp.json();
    const raw=data.content?.map(c=>c.text||'').join('').trim().replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(raw);
    parsed.id='custom_'+uid();parsed.x=(Math.random()-0.5)*1.8;parsed.y=(Math.random()-0.5)*1.8;parsed.z=(Math.random()-0.5)*1.8;parsed.size=1.0+Math.random()*0.4;
    grants.push(parsed);saveGrants();rebuildGlobe();selectGrant(parsed.id);updateStats();
    document.getElementById('upload-inner').innerHTML=`<div style="font-size:9px;color:#34d399;letter-spacing:1px">// ADDED: ${parsed.label.toUpperCase()}</div>`;
    setTimeout(()=>{document.getElementById('upload-inner').innerHTML='<div class="upload-plus">+</div><div class="upload-t">DROP GRANT DOCUMENT · ADD VECTOR</div><div class="upload-s">PDF · TXT · MD · PNG — parsed by AI</div>';},3000);
  }catch(e){
    document.getElementById('upload-inner').innerHTML=`<div style="font-size:9px;color:#f87171;line-height:1.5">Parse failed: ${e.message}</div>`;
    setTimeout(()=>{document.getElementById('upload-inner').innerHTML='<div class="upload-plus">+</div><div class="upload-t">DROP GRANT DOCUMENT · ADD VECTOR</div><div class="upload-s">PDF · TXT · MD · PNG — parsed by AI</div>';},4000);
  }
}

let globeRenderer,globeScene,globeCamera,globeMainGroup;
let globeNodeMeshes=[],globeGlowMeshes=[],globeRAF=null;
let rotY=0.3,rotX=-0.15,isDragging=false,prevMX=0,prevMY=0;

function makeRing(radius,color,opacity,rx,ry,rz){
  const pts=[];for(let i=0;i<=128;i++){const a=(i/128)*Math.PI*2;pts.push(Math.cos(a)*radius,Math.sin(a)*radius,0);}
  const geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
  const l=new THREE.Line(geo,new THREE.LineBasicMaterial({color,transparent:true,opacity}));
  l.rotation.set(rx||0,ry||0,rz||0);return l;
}

function buildSphere(radius,statusColor){
  const group=new THREE.Group();
  const col=new THREE.Color(statusColor);
  const bright=col.clone().multiplyScalar(1.25);
  const dark=col.clone().multiplyScalar(0.22);
  const coreMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.9});
  group.add(new THREE.Mesh(new THREE.SphereGeometry(radius*0.65,32,32),coreMat));
  group.add(new THREE.Mesh(new THREE.SphereGeometry(radius*0.85,16,16),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.22})));
  const wireMat=new THREE.MeshBasicMaterial({color:bright,transparent:true,opacity:0.48,wireframe:true});
  group.add(new THREE.Mesh(new THREE.SphereGeometry(radius*0.87,10,10),wireMat));
  group.add(new THREE.Mesh(new THREE.SphereGeometry(radius*1.55,16,16),new THREE.MeshBasicMaterial({color:dark,transparent:true,opacity:0.07,side:THREE.BackSide})));
  for(let i=0;i<3;i++){
    const rr=radius*(0.96+i*0.28);const rp=[];
    for(let j=0;j<=80;j++){const a=(j/80)*Math.PI*2;rp.push(Math.cos(a)*rr,Math.sin(a)*rr,0);}
    const rg=new THREE.BufferGeometry();rg.setAttribute('position',new THREE.Float32BufferAttribute(rp,3));
    const ring=new THREE.Line(rg,new THREE.LineBasicMaterial({color:bright,transparent:true,opacity:i===0?0.7:i===1?0.38:0.18}));
    ring.rotation.x=(Math.PI/2)+i*0.55;ring.rotation.y=i*1.2;group.add(ring);
  }
  for(let i=0;i<6;i++){
    const dm=new THREE.Mesh(new THREE.SphereGeometry(radius*0.06,6,6),new THREE.MeshBasicMaterial({color:bright,transparent:true,opacity:0.9}));
    const phi=Math.acos(-1+2*i/6);const theta=Math.sqrt(6*Math.PI)*phi;
    dm.position.setFromSpherical(new THREE.Spherical(radius*0.88,phi,theta));group.add(dm);
  }
  group.userData.coreMat=coreMat;group.userData.wireMat=wireMat;
  return group;
}

function buildGlobe(){
  const mount=document.getElementById('globe-mount');
  const W=mount.clientWidth,H=Math.max(mount.clientHeight,220);
  globeRenderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  globeRenderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  globeRenderer.setClearColor(0x000000,0);
  globeRenderer.setSize(W,H,false);
  mount.insertBefore(globeRenderer.domElement,mount.firstChild);
  globeScene=new THREE.Scene();
  globeCamera=new THREE.PerspectiveCamera(52,W/H,0.1,100);
  globeCamera.position.set(0,0.4,5.0);
  globeMainGroup=new THREE.Group();globeScene.add(globeMainGroup);
  globeMainGroup.add(makeRing(1.65,0x0a2a4a,0.7));
  globeMainGroup.add(makeRing(1.65,0x0a2a4a,0.42,Math.PI/2));
  globeMainGroup.add(makeRing(1.65,0x0a2a4a,0.28,0,Math.PI/2));
  globeMainGroup.add(makeRing(1.65,0x071a30,0.2,Math.PI/3,0,Math.PI/5));
  const gp=[];for(let i=-2;i<=2;i+=0.5){gp.push(i,-1.95,-2,i,-1.95,2,-2,-1.95,i,2,-1.95,i);}
  const gg=new THREE.BufferGeometry();gg.setAttribute('position',new THREE.Float32BufferAttribute(gp,3));
  globeMainGroup.add(new THREE.LineSegments(gg,new THREE.LineBasicMaterial({color:0x030d1c,transparent:true,opacity:0.9})));

  globeMainGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.06,16,16),new THREE.MeshBasicMaterial({color:0x4fc3f7,transparent:true,opacity:0.7})));
  globeNodeMeshes=[];globeGlowMeshes=[];
  grants.forEach((g,i)=>{
    const s=SM[g.status];const pos=new THREE.Vector3(g.x*1.55,g.y*1.55,g.z*1.55);const r=(g.size||1)*0.1;
    const sp=[];sp.push(...[new THREE.Vector3(0,0,0),pos.clone()]);
    const sg2=new THREE.BufferGeometry().setFromPoints(sp);
    globeMainGroup.add(new THREE.Line(sg2,new THREE.LineBasicMaterial({color:new THREE.Color(s.color),transparent:true,opacity:0.1})));
    const sg=buildSphere(r,s.color);sg.position.copy(pos);sg.userData.id=g.id;sg.userData.index=i;globeMainGroup.add(sg);
    const hit=new THREE.Mesh(new THREE.SphereGeometry(r*1.65,12,12),new THREE.MeshBasicMaterial({transparent:true,opacity:0,depthWrite:false}));
    hit.position.copy(pos);hit.userData={id:g.id,index:i,sg};globeMainGroup.add(hit);globeNodeMeshes.push(hit);
    const glow=new THREE.Mesh(new THREE.SphereGeometry(r*2.3,16,16),new THREE.MeshBasicMaterial({color:new THREE.Color(s.color),transparent:true,opacity:0,side:THREE.BackSide}));
    glow.position.copy(pos);globeMainGroup.add(glow);globeGlowMeshes.push(glow);
    const lines=g.label.split(' ');const mid=Math.ceil(lines.length/2);
    const cv=document.createElement('canvas');cv.width=280;cv.height=72;const ctx=cv.getContext('2d');
    ctx.fillStyle=g.status==='future'?'#4b5563':s.color;ctx.font="700 19px 'Courier New',monospace";ctx.textAlign='center';
    ctx.fillText(lines.slice(0,mid).join(' '),140,26);if(lines.slice(mid).length)ctx.fillText(lines.slice(mid).join(' '),140,50);
    const sp2=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,depthWrite:false}));
    sp2.scale.set(1.05,0.27,1);sp2.position.set(pos.x+pos.x*0.12,pos.y+pos.y*0.12+0.25,pos.z+pos.z*0.12);globeMainGroup.add(sp2);
  });
  const raycaster=new THREE.Raycaster();
  new ResizeObserver(()=>{
    const m=document.getElementById('globe-mount');
    const nW=m.clientWidth,nH=Math.max(m.clientHeight,220);
    globeRenderer.setSize(nW,nH,false);globeCamera.aspect=nW/nH;globeCamera.updateProjectionMatrix();
  }).observe(mount);
  globeRenderer.domElement.addEventListener('mousedown',e=>{isDragging=true;prevMX=e.clientX;prevMY=e.clientY;autoRotate=false;});
  window.addEventListener('mouseup',()=>{isDragging=false;});
  globeRenderer.domElement.addEventListener('mousemove',e=>{
    const rect=globeRenderer.domElement.getBoundingClientRect();
    mousePos.x=((e.clientX-rect.left)/rect.width)*2-1;
    mousePos.y=-((e.clientY-rect.top)/rect.height)*2+1;
    if(isDragging){rotY+=(e.clientX-prevMX)*0.007;rotX+=(e.clientY-prevMY)*0.007;rotX=Math.max(-1.1,Math.min(1.1,rotX));prevMX=e.clientX;prevMY=e.clientY;}
  });
  globeRenderer.domElement.addEventListener('wheel',e=>{zoom=Math.max(2.5,Math.min(8,zoom+e.deltaY*0.005));e.preventDefault();},{passive:false});
  globeRenderer.domElement.addEventListener('click',e=>{
    const rect=globeRenderer.domElement.getBoundingClientRect();
    const m2={x:((e.clientX-rect.left)/rect.width)*2-1,y:-((e.clientY-rect.top)/rect.height)*2+1};
    raycaster.setFromCamera(m2,globeCamera);
    const hits=raycaster.intersectObjects(globeNodeMeshes);
    if(hits.length>0&&hits[0].object.userData.id){
      selectGrant(hits[0].object.userData.id);
    }
  });
  let touchLast=null,touchStartPos=null;
  globeRenderer.domElement.addEventListener('touchstart',e=>{
    touchLast=e.touches[0];
    touchStartPos={x:e.touches[0].clientX,y:e.touches[0].clientY};
    autoRotate=false;
  },{passive:true});
  globeRenderer.domElement.addEventListener('touchmove',e=>{
    if(!touchLast)return;
    rotY+=(e.touches[0].clientX-touchLast.clientX)*0.007;
    rotX+=(e.touches[0].clientY-touchLast.clientY)*0.007;
    rotX=Math.max(-1.1,Math.min(1.1,rotX));
    touchLast=e.touches[0];
    e.preventDefault();
  },{passive:false});
  globeRenderer.domElement.addEventListener('touchend',e=>{
    if(!touchStartPos)return;
    const dx=e.changedTouches[0].clientX-touchStartPos.x;
    const dy=e.changedTouches[0].clientY-touchStartPos.y;
    if(Math.sqrt(dx*dx+dy*dy)<8){
      // Treat as tap — raycast for node
      const rect=globeRenderer.domElement.getBoundingClientRect();
      const tx=((e.changedTouches[0].clientX-rect.left)/rect.width)*2-1;
      const ty=-((e.changedTouches[0].clientY-rect.top)/rect.height)*2+1;
      const tr=new THREE.Raycaster();
      tr.setFromCamera({x:tx,y:ty},globeCamera);
      const th=tr.intersectObjects(globeNodeMeshes);
      if(th.length>0&&th[0].object.userData.id){
        selectGrant(th[0].object.userData.id);
        // Scroll right panel into view on mobile
        const rp=document.getElementById('right-panel');
        if(rp&&window.innerWidth<=700)rp.scrollIntoView({behavior:'smooth',block:'start'});
      }
    }
    touchStartPos=null;touchLast=null;
  },{passive:true});
  if(globeRAF)cancelAnimationFrame(globeRAF);
  (function animate(){
    globeRAF=requestAnimationFrame(animate);
    globeTime+=0.016;
    if(!autoRotate&&!isDragging)autoRotate=true;
    if(autoRotate)rotY+=0.0018;
    globeMainGroup.rotation.y=rotY;globeMainGroup.rotation.x=rotX;
    globeCamera.position.z+=(zoom-globeCamera.position.z)*0.08;globeCamera.updateProjectionMatrix();
    raycaster.setFromCamera(mousePos,globeCamera);
    const hits=raycaster.intersectObjects(globeNodeMeshes);
    const hovId=hits.length>0?hits[0].object.userData.id:null;
    globeNodeMeshes.forEach((hit,i)=>{
      const sg=hit.userData.sg;if(!sg)return;
      const isHov=grants[i]&&grants[i].id===hovId;
      const isSel=grants[i]&&grants[i].id===selectedId;
      const pulse=1+Math.sin(globeTime*2+i*1.1)*0.04;
      sg.scale.setScalar(isSel?1.28:isHov?1.12:pulse);
      if(sg.userData.coreMat)sg.userData.coreMat.opacity=isSel?1.0:isHov?0.96:0.88;
      if(sg.userData.wireMat)sg.userData.wireMat.opacity=isSel?0.82:isHov?0.6:0.42;
      if(globeGlowMeshes[i])globeGlowMeshes[i].material.opacity=isSel?0.3:isHov?0.16:0.04;
      sg.rotation.y=globeTime*0.4*(i%2===0?1:-1);
    });
    globeRenderer.domElement.style.cursor=hovId?'pointer':'crosshair';
    globeRenderer.render(globeScene,globeCamera);
  })();
}
function rebuildGlobe(){
  const m=document.getElementById('globe-mount');
  const ex=m.querySelector('canvas');if(ex)m.removeChild(ex);
  if(globeRAF)cancelAnimationFrame(globeRAF);
  buildGlobe();
}


/* ── Authentication ── */
async function hashPassword(pwd){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pwd));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
