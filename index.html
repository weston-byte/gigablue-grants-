document.getElementById('pwd').focus();
async function unlock(){
  const pwd=document.getElementById('pwd').value;
  if(!pwd){document.getElementById('err').textContent='// enter access code';return;}
  const btn=document.getElementById('btn');
  btn.disabled=true;btn.textContent='Decrypting...';
  document.getElementById('err').textContent='';
  document.getElementById('st').textContent='// deriving key...';
  try{
    const salt=b64d(P.salt),iv=b64d(P.iv),ct=b64d(P.ciphertext);
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pwd),'PBKDF2',false,['deriveKey']);
    document.getElementById('st').textContent='// PBKDF2...';
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:P.iterations,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    document.getElementById('st').textContent='// decrypting...';
    const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
    document.getElementById('st').textContent='// rendering...';
    document.open();document.write(new TextDecoder().decode(dec));document.close();
  }catch(e){
    document.getElementById('err').textContent='// access denied';
    document.getElementById('st').textContent='';
    btn.disabled=false;btn.textContent='Authenticate';
    document.getElementById('pwd').value='';
    document.getElementById('pwd').focus();
  }
}
function b64d(s){const b=atob(s),u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
