async function unlock(){
  const pwd=document.getElementById('pwd').value;
  if(!pwd){document.getElementById('err').textContent='// enter access code';return;}
  const btn=document.getElementById('btn');
  btn.disabled=true;btn.textContent='Decrypting...';
  document.getElementById('err').textContent='';
  document.getElementById('status').textContent='// deriving key...';
  try{
    const salt=b64d(PAYLOAD.salt),iv=b64d(PAYLOAD.iv),ct=b64d(PAYLOAD.ciphertext);
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pwd),'PBKDF2',false,['deriveKey']);
    document.getElementById('status').textContent='// PBKDF2 ('+PAYLOAD.iterations.toLocaleString()+' iterations)...';
    const key=await crypto.subtle.deriveKey(
      {name:'PBKDF2',salt,iterations:PAYLOAD.iterations,hash:'SHA-256'},
      km,{name:'AES-GCM',length:256},false,['decrypt']
    );
    document.getElementById('status').textContent='// decrypting...';
    const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
    document.getElementById('status').textContent='// rendering...';
    const html=new TextDecoder().decode(dec);
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById('err').textContent='// access denied';
    document.getElementById('status').textContent='';
    btn.disabled=false;btn.textContent='Authenticate';
    document.getElementById('pwd').value='';
    document.getElementById('pwd').focus();
  }
}
function b64d(s){const b=atob(s),u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
